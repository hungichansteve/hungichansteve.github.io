<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Lucky Draw!</title>
    <style>
        body { 
            background-color: #FFF9C4; /* Soft warm yellow */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; 
            overflow-x: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #E65100; /* Deep festive orange */
            margin: 10px 0;
            font-size: 2.8rem;
            text-align: center;
            text-shadow: 2px 2px 0px #FFF;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        /* Wheel Pointer */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 5px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #D32F2F;
            z-index: 10;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.2));
        }
        canvas { 
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        /* Animated Lucky Draw Banner */
        .result-banner {
            width: 340px;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            padding: 15px 0;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            /* Default Idle Animation (Rainbow Shift) */
            background: linear-gradient(270deg, #ff5722, #4caf50, #2196f3, #9c27b0);
            background-size: 800% 800%;
            animation: rainbow-idle 6s ease infinite;
        }
        /* Victory Shine Animation */
        .result-banner.victory {
            background: #FFD700 !important; /* Gold */
            color: #000000 !important;
            animation: victory-glow 0.3s linear infinite !important;
            border: 4px dashed #FF5722;
            box-sizing: border-box;
        }
        /* Activity Scroller Box */
        .scroller-box {
            width: 340px;
            height: 80px;
            background: #FFFFFF;
            border: 6px solid #FFB300;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.15);
        }
        .scroller-container {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .scroller-item {
            height: 80px;
            line-height: 80px;
            text-align: center;
            font-size: 1.4rem;
            color: #333333;
            font-weight: bold;
        }
        /* Massive Arcade Styled Tap Button */
        button { 
            margin-top: 10px;
            width: 120px;
            height: 120px;
            font-size: 1.5rem; 
            font-weight: bold;
            background: #FF3D00; 
            color: white; 
            border: 8px solid #FFF;
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 10px 0px #BF360C, 0 15px 20px rgba(0,0,0,0.3);
            font-family: inherit;
            transition: transform 0.05s ease;
        }
        button:active { 
            box-shadow: 0 3px 0px #BF360C, 0 5px 10px rgba(0,0,0,0.3); 
            transform: translateY(7px); 
        }
        button:disabled {
            background: #BDBDBD;
            border-color: #E0E0E0;
            box-shadow: 0 6px 0px #9E9E9E;
            cursor: not-allowed;
            transform: none;
        }

        /* ANIMATION KEYFRAMES */
        @keyframes rainbow-idle {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        @keyframes victory-glow {
            0% { background-color: #FFD700; filter: brightness(1); }
            50% { background-color: #FFEA00; filter: brightness(1.3); box-shadow: 0 0 25px #FFEA00; }
            100% { background-color: #FFD700; filter: brightness(1); }
        }
    </style>
</head>
<body>

    <h1>🌟 LUCKY DRAW! 🌟</h1>
    
    <div class="game-container">
        <!-- Arcade Spinner -->
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
        </div>

        <!-- Attract Banner (Animates smoothly continuously) -->
        <div class="result-banner" id="festivalDisplay">🎁 SPIN ME! 🎁</div>

        <!-- Activity Slot Window -->
        <div class="scroller-box">
            <div class="scroller-container" id="scroller">
                <div class="scroller-item">❓ What will you get?</div>
            </div>
        </div>

        <!-- Round Red Target Arcade Button -->
        <button id="spinBtn" onclick="startSequence()">TAP<br>HERE!</button>
    </div>

    <script>
        const festivalDatabase = [
            { 
                name: "Chinese New Year", 
                activities: ["🧧 Get Red Packets!", "🦁 Watch Lion Dances!", "🧹 Do General Cleaning!", "🥟 Eat Rice Cakes!"] 
            },
            { 
                name: "Mid-Autumn Festival", 
                activities: ["🥮 Eat Mooncakes!", "🏮 Carry Lanterns!", "🌕 Watch the Full Moon!", "🧩 Solve Lantern Riddles!"] 
            },
            { 
                name: "Dragon-boat Festival", 
                activities: ["🐉 Race Dragon Boats!", "🍃 Eat Zongzi Dumplings!", "🌾 Hang Mugwort Leaves!", "🌊 Swim in Dragon Water!"] 
            },
            { 
                name: "Christmas", 
                activities: ["🎄 Decorate the Tree!", "🎁 Open Presents!", "🦌 See Santa Claus!", "🎶 Sing Christmas Carols!"] 
            },
            {
                name: "Easter",
                activities: ["🥚 Hunt for Easter Eggs!", "🎨 Paint Egg Shells!", "🐰 See the Easter Bunny!", "🍫 Eat Chocolate Eggs!"]
            }
        ];

        const colors = ["#FF5722", "#4CAF50", "#2196F3", "#9C27B0", "#FF9800"];
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const scroller = document.getElementById('scroller');
        const festivalDisplay = document.getElementById('festivalDisplay');
        const spinBtn = document.getElementById('spinBtn');

        let currentRotation = 0;

        function drawWheel() {
            const numSegments = festivalDatabase.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * anglePerSegment - (Math.PI / 2);
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                ctx.lineWidth = 5;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                // Bright star-dot anchors on the edge to make it look like a carnival game wheel
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.beginPath();
                ctx.arc(radius - 20, 0, 7, 0, 2 * Math.PI);
                ctx.fillStyle = "#FFFFFF";
                ctx.fill();
                ctx.restore();
            }
        }

        // Ticking audio generator
        function playTickSound(duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let startTime = audioCtx.currentTime;
            let tickDelay = 40; // Quick initial clicks

            function nextTick() {
                if (audioCtx.currentTime - startTime > duration / 1000) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.setValueAtTime(750, audioCtx.currentTime); // High pitch bright pop
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.015);

                tickDelay += 18; // Slowly drag out time interval to simulate drag/friction
                setTimeout(nextTick, tickDelay);
            }
            nextTick();
        }

        // Win fanfare tone structure
        function playWinFanfare() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 arpeggio chord
            notes.forEach((freq, index) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, index * 100);
            });
        }

        function startSequence() {
            spinBtn.disabled = true;
            
            // Clean/Reset visuals back out of victory state
            festivalDisplay.classList.remove('victory');
            festivalDisplay.innerText = "🎰 SPINNING! 🎰";
            
            scroller.style.transition = "none";
            scroller.style.top = "0px";
            scroller.innerHTML = '<div class="scroller-item">🌀 Waiting...</div>';
            
            const targetIndex = Math.floor(Math.random() * festivalDatabase.length);
            
            playTickSound(3000);

            const degreesPerSegment = 360 / festivalDatabase.length;
            const extraSpins = 4 * 360; // Extra full turns for drama
            const targetAngle = 270 - (targetIndex * degreesPerSegment) - (degreesPerSegment / 2);
            
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Sequence triggered when the spinner wheel stops moving
            setTimeout(() => {
                const matchedFestival = festivalDatabase[targetIndex];
                
                // Show text with victory flash shine effect
                festivalDisplay.innerText = "✨ " + matchedFestival.name.toUpperCase() + " ✨";
                festivalDisplay.classList.add('victory');
                playWinFanfare();

                const activityPool = matchedFestival.activities;
                const chosenActivityIndex = Math.floor(Math.random() * activityPool.length);
                
                let scrollItemsPool = [];
                for (let r = 0; r < 4; r++) {
                    activityPool.forEach(act => scrollItemsPool.push(act));
                }

                scroller.innerHTML = '';
                scrollItemsPool.forEach(actText => {
                    const div = document.createElement('div');
                    div.className = 'scroller-item';
                    div.innerText = actText;
                    scroller.appendChild(div);
                });

                const rowHeight = 80;
                const finalTargetRow = (activityPool.length * 2) + chosenActivityIndex;
                const finalScrollPosition = finalTargetRow * rowHeight;

                // Move slot machine scroller
                setTimeout(() => {
                    scroller.style.transition = "top 2s cubic-bezier(0.1, 0.8, 0.2, 1)";
                    scroller.style.top = `-${finalScrollPosition}px`;
                }, 50);

                // Enable button again
                setTimeout(() => {
                    spinBtn.disabled = false;
                }, 2100);

            }, 3000);
        }

        drawWheel();
    </script>
</body>
</html>
