<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Fun Spinner</title>
    <style>
        body { 
            background-color: #E3F2FD; /* Soft cheerful sky blue */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; 
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #1565C0; /* Deep friendly blue */
            margin: 10px 0;
            font-size: 2.6rem;
            text-align: center;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        /* Wheel Pointer */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 5px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #FF3D00; /* Bright red arrow */
            z-index: 10;
        }
        canvas { 
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        /* Kids Theme Display Banner (Toy Ticket Style) */
        .result-banner {
            width: 480px; 
            color: #1565C0;
            background: #FFFFFF;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            padding: 12px 10px;
            border-radius: 20px;
            border: 4px dashed #1565C0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        /* Soft, magical celebrate state when landed */
        .result-banner.celebrate {
            background: #FFF59D; /* Soft sunshine yellow */
            border-color: #F57F17;
            color: #F57F17;
            scale: 1.03;
        }
        /* Clean Activity Window */
        .scroller-box {
            width: 380px;
            height: 80px; /* Fixed window height */
            background: #FFFFFF;
            border: 5px solid #4FC3F7; /* Friendly light blue border */
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .scroller-container {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .scroller-item {
            height: 80px; /* Synchronized perfectly with the box height to stop overlaps! */
            line-height: 80px; /* Vertically centers the text perfectly */
            text-align: center;
            font-size: 1.35rem;
            color: #333333;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Fixed Circular Button Container */
        .button-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 130px; /* Gives the circle full breathing room */
        }
        /* Clean Toy-Style Arcade Circular Button */
        button { 
            width: 110px;
            height: 110px;
            font-size: 1.3rem; 
            font-weight: bold;
            background: #4CAF50; /* Playful Green */
            color: white; 
            border: 6px solid #FFFFFF;
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 8px 0px #2E7D32, 0 10px 15px rgba(0,0,0,0.15);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            box-sizing: border-box;
        }
        button:active { 
            box-shadow: 0 2px 0px #2E7D32, 0 4px 8px rgba(0,0,0,0.15); 
            transform: translateY(6px); 
        }
        button:disabled {
            background: #BDBDBD;
            border-color: #E0E0E0;
            box-shadow: 0 4px 0px #9E9E9E;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <h1>🎈 Festival Fun Spinner 🎈</h1>
    
    <div class="game-container">
        <!-- Spinner -->
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
        </div>

        <!-- Banner -->
        <div class="result-banner" id="festivalDisplay">✨ What do you like doing at...? ✨</div>

        <!-- Activity Box -->
        <div class="scroller-box">
            <div class="scroller-container" id="scroller">
                <div class="scroller-item">I like...</div>
            </div>
        </div>

        <!-- Button Zone -->
        <div class="button-zone">
            <button id="spinBtn" onclick="startSequence()">TAP<br>HERE!</button>
        </div>
    </div>

    <script>
        const festivalDatabase = [
            { 
                name: "Chinese New Year", 
                activities: ["🧧 Get Red Packets!", "🧑‍🤝‍🧑 Visit relatives!", "🎆 Watch fireworks!", "🌸 Go to the flower market!"] 
            },
            { 
                name: "Mid-Autumn Festival", 
                activities: ["🥮 Eat mooncakes!", "🏮 Play with lanterns!"] 
            },
            { 
                name: "Dragon-boat Festival", 
                activities: ["🐉 Watch dragon boat races!", "🍃 Eat rice dumplings!"] 
            },
            { 
                name: "Christmas", 
                activities: ["🎁 Get presents!", "🎁 Give presents!", "🌟 Look at the Christmas lights!"] 
            },
            {
                name: "Easter",
                activities: ["🥚 Do egg hunts!", "🍫 Eat chocolate eggs!"]
            }
        ];

        const colors = ["#FF7043", "#66BB6A", "#42A5F5", "#AB47BC", "#FFA726"];
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const scroller = document.getElementById('scroller');
        const festivalDisplay = document.getElementById('festivalDisplay');
        const spinBtn = document.getElementById('spinBtn');

        let currentRotation = 0;

        function drawWheel() {
            const numSegments = festivalDatabase.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * anglePerSegment - (Math.PI / 2);
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.beginPath();
                ctx.arc(radius - 18, 0, 6, 0, 2 * Math.PI);
                ctx.fillStyle = "#FFFFFF";
                ctx.fill();
                ctx.restore();
            }
        }

        function playTickSound(duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let startTime = audioCtx.currentTime;
            let tickDelay = 45;

            function nextTick() {
                if (audioCtx.currentTime - startTime > duration / 1000) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.setValueAtTime(700, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.01);

                tickDelay += 18; 
                setTimeout(nextTick, tickDelay);
            }
            nextTick();
        }

        function playWinFanfare() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 987.77]; 
            notes.forEach((freq, index) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, index * 90);
            });
        }

        function startSequence() {
            spinBtn.disabled = true;
            
            festivalDisplay.classList.remove('celebrate');
            festivalDisplay.innerText = "✨ What do you like doing at...? ✨";
            
            scroller.style.transition = "none";
            scroller.style.top = "0px";
            scroller.innerHTML = '<div class="scroller-item">I like...</div>';
            
            const targetIndex = Math.floor(Math.random() * festivalDatabase.length);
            
            playTickSound(3000);

            const degreesPerSegment = 360 / festivalDatabase.length;
            const extraSpins = 3 * 360; 
            const targetAngle = 270 - (targetIndex * degreesPerSegment) - (degreesPerSegment / 2);
            
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Wheel alignment timeline event (At 3 seconds)
            setTimeout(() => {
                const matchedFestival = festivalDatabase[targetIndex];
                
                festivalDisplay.innerText = "🎈 " + matchedFestival.name + " 🎈";
                festivalDisplay.classList.add('celebrate');
                playWinFanfare();

                // Placeholder stays clean and clear
                scroller.innerHTML = '<div class="scroller-item">I like...</div>';

                // Suspense break logic tracking window updates (At 1 additional second)
                setTimeout(() => {
                    playTickSound(2000);

                    const activityPool = matchedFestival.activities;
                    const chosenActivityIndex = Math.floor(Math.random() * activityPool.length);
                    
                    let scrollItemsPool = [];
                    for (let r = 0; r < 4; r++) {
                        activityPool.forEach(act => scrollItemsPool.push(act));
                    }

                    scroller.innerHTML = '';
                    scrollItemsPool.forEach(actText => {
                        const div = document.createElement('div');
                        div.className = 'scroller-item';
                        div.innerText = actText;
                        scroller.appendChild(div);
                    });

                    // Adjusted math formula to use the newly unified 80px calculation factor!
                    const rowHeight = 80;
                    const finalTargetRow = (activityPool.length * 2) + chosenActivityIndex;
                    const finalScrollPosition = finalTargetRow * rowHeight;

                    setTimeout(() => {
                        scroller.style.transition = "top 2s cubic-bezier(0.1, 0.8, 0.2, 1)";
                        scroller.style.top = `-${finalScrollPosition}px`;
                    }, 50);

                    setTimeout(() => {
                        spinBtn.disabled = false;
                    }, 2100);

                }, 1000);

            }, 3000);
        }

        drawWheel();
    </script>
</body>
</html>
