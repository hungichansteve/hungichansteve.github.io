<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Fun Spinner</title>
    <style>
        body { 
            background-color: #FFF9C4; /* Soft warm yellow */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; 
            overflow-x: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #E65100; /* Deep festive orange */
            margin: 10px 0;
            font-size: 2.5rem;
            text-align: center;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        /* Wheel Pointer */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 10px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #D32F2F;
            z-index: 10;
        }
        canvas { 
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        /* Result Display Box */
        .result-banner {
            width: 340px;
            background: #1565C0;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            padding: 12px 0;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Activity Scroller */
        .scroller-box {
            width: 340px;
            height: 80px;
            background: #FFFFFF;
            border: 6px solid #FFB300;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }
        .scroller-container {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .scroller-item {
            height: 80px;
            line-height: 80px;
            text-align: center;
            font-size: 1.35rem;
            color: #333333;
            font-weight: bold;
        }
        /* Spin Button */
        button { 
            margin-top: 10px;
            padding: 15px 60px; 
            font-size: 2rem; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 10px #2E7D32;
            font-family: inherit;
        }
        button:active { 
            box-shadow: 0 4px #2E7D32; 
            transform: translateY(6px); 
        }
        button:disabled {
            background: #BDBDBD;
            box-shadow: 0 6px #9E9E9E;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Festival Fun Spinner!</h1>
    
    <div class="game-container">
        <!-- Colorful Board-Game Style Spinner Wheel -->
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
        </div>

        <!-- Displays the Drawn Festival cleanly with no text cut-offs -->
        <div class="result-banner" id="festivalDisplay">Ready to Spin!</div>

        <!-- Activity Slot Scroller Box -->
        <div class="scroller-box">
            <div class="scroller-container" id="scroller">
                <div class="scroller-item">🎯 Waiting for activity...</div>
            </div>
        </div>

        <button id="spinBtn" onclick="startSequence()">SPIN!</button>
    </div>

    <script>
        // Strictly matched dictionary linking the exact index to its clean names and activities
        const festivalDatabase = [
            { 
                name: "Chinese New Year", 
                activities: ["🧧 Get Red Packets!", "🦁 Watch Lion Dances!", "🧹 Do General Cleaning!", "🥟 Eat Rice Cakes!"] 
            },
            { 
                name: "Mid-Autumn Festival", 
                activities: ["🥮 Eat Mooncakes!", "🏮 Carry Lanterns!", "🌕 Watch the Full Moon!", "🧩 Solve Lantern Riddles!"] 
            },
            { 
                name: "Dragon-boat Festival", 
                activities: ["🐉 Race Dragon Boats!", "🍃 Eat Zongzi Dumplings!", "🌾 Hang Mugwort Leaves!", "🌊 Swim in Dragon Water!"] 
            },
            { 
                name: "Christmas", 
                activities: ["🎄 Decorate the Tree!", "🎁 Open Presents!", "🦌 See Santa Claus!", "🎶 Sing Christmas Carols!"] 
            },
            {
                name: "Easter",
                activities: ["🥚 Hunt for Easter Eggs!", "🎨 Paint Egg Shells!", "🐰 See the Easter Bunny!", "🍫 Eat Chocolate Eggs!"]
            }
        ];

        // 5 distinct colors for the 5 wheel segments
        const colors = ["#FF5722", "#4CAF50", "#2196F3", "#9C27B0", "#FF9800"];
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const scroller = document.getElementById('scroller');
        const festivalDisplay = document.getElementById('festivalDisplay');
        const spinBtn = document.getElementById('spinBtn');

        let currentRotation = 0;

        // Draw a clean color-wheel spinner
        function drawWheel() {
            const numSegments = festivalDatabase.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * anglePerSegment - (Math.PI / 2);
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                // Segment borders
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                // Draw a small distinct white circle on the rim edge of each slice to show progress
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.beginPath();
                ctx.arc(radius - 25, 0, 8, 0, 2 * Math.PI);
                ctx.fillStyle = "#FFFFFF";
                ctx.fill();
                ctx.restore();
            }
        }

        function playTickSound(duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let startTime = audioCtx.currentTime;
            let tickDelay = 50;

            function nextTick() {
                if (audioCtx.currentTime - startTime > duration / 1000) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);

                tickDelay += 16; 
                setTimeout(nextTick, tickDelay);
            }
            nextTick();
        }

        function startSequence() {
            spinBtn.disabled = true;
            
            // Clear interfaces to reset game state safely
            festivalDisplay.style.background = "#1565C0";
            festivalDisplay.innerText = "Spinning...";
            scroller.style.transition = "none";
            scroller.style.top = "0px";
            scroller.innerHTML = '<div class="scroller-item">⏳ Waiting for wheel...</div>';
            
            // Determine our exact landing index value safely (0 to 4)
            const targetIndex = Math.floor(Math.random() * festivalDatabase.length);
            
            playTickSound(3000);

            const degreesPerSegment = 360 / festivalDatabase.length;
            const extraSpins = 3 * 360; 
            
            // Mathematical calculations to align the color slice matching our target index directly to the top pointer
            const targetAngle = 270 - (targetIndex * degreesPerSegment) - (degreesPerSegment / 2);
            
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Sequence Part 2: Activates automatically when the spinner wheel stops moving
            setTimeout(() => {
                // Instantly print out the verified match name to our banner
                const matchedFestival = festivalDatabase[targetIndex];
                festivalDisplay.innerText = "🎉 " + matchedFestival.name + "!";
                festivalDisplay.style.background = "#E65100"; // Pop color change

                // Isolate the matching array pool explicitly
                const activityPool = matchedFestival.activities;
                const chosenActivityIndex = Math.floor(Math.random() * activityPool.length);
                
                // Build a slot loop containing ONLY correct activities for this festival
                let scrollItemsPool = [];
                for (let r = 0; r < 4; r++) {
                    activityPool.forEach(act => scrollItemsPool.push(act));
                }

                // Push items inside the HTML DOM structure safely
                scroller.innerHTML = '';
                scrollItemsPool.forEach(actText => {
                    const div = document.createElement('div');
                    div.className = 'scroller-item';
                    div.innerText = actText;
                    scroller.appendChild(div);
                });

                const rowHeight = 80;
                const finalTargetRow = (activityPool.length * 2) + chosenActivityIndex;
                const finalScrollPosition = finalTargetRow * rowHeight;

                // Fire the scroll action glide animation
                setTimeout(() => {
                    scroller.style.transition = "top 2.2s cubic-bezier(0.1, 0.8, 0.2, 1)";
                    scroller.style.top = `-${finalScrollPosition}px`;
                }, 50);

                // Lift the system interaction lockout
                setTimeout(() => {
                    spinBtn.disabled = false;
                }, 2300);

            }, 3000);
        }

        // Run rendering logic
        drawWheel();
    </script>
</body>
</html>
