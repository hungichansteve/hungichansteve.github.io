<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Fun Spinner</title>
    <style>
        body { 
            background-color: #FFF9C4; /* Soft warm yellow */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; 
            overflow-x: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #E65100; /* Deep festive orange */
            margin: 15px 0;
            font-size: 2.5rem;
            text-align: center;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        /* Wheel Pointer */
        .wheel-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #D32F2F;
            z-index: 10;
        }
        canvas { 
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        /* Activity Scroller */
        .scroller-box {
            width: 360px;
            height: 80px;
            background: #FFFFFF;
            border: 6px solid #FFB300;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }
        .scroller-container {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .scroller-item {
            height: 80px;
            line-height: 80px;
            text-align: center;
            font-size: 1.4rem;
            color: #333333;
            font-weight: bold;
        }
        /* Spin Button */
        button { 
            padding: 15px 60px; 
            font-size: 2rem; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 10px #2E7D32;
            font-family: inherit;
        }
        button:active { 
            box-shadow: 0 4px #2E7D32; 
            transform: translateY(6px); 
        }
        button:disabled {
            background: #BDBDBD;
            box-shadow: 0 6px #9E9E9E;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Festival Fun Spinner!</h1>
    
    <div class="game-container">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="360" height="360"></canvas>
        </div>

        <div class="scroller-box">
            <div class="scroller-container" id="scroller">
                <div class="scroller-item">Spin the wheel first!</div>
            </div>
        </div>

        <button id="spinBtn" onclick="startSequence()">SPIN!</button>
    </div>

    <script>
        // Five distinct festivals with culturally relevant primary school activities
        const festivalData = [
            { 
                name: "Chinese New Year", 
                activities: ["🧧 Get Red Packets!", "🦁 Watch Lion Dances!", "🧹 Do General Cleaning!", "🥟 Eat Rice Cakes!"] 
            },
            { 
                name: "Mid-Autumn", 
                activities: ["🥮 Eat Mooncakes!", "🏮 Carry Lanterns!", "🌕 Watch the Full Moon!", "🧩 Solve Lantern Riddles!"] 
            },
            { 
                name: "Dragon-boat", 
                activities: ["🐉 Race Dragon Boats!", "🍃 Eat Zongzi Dumplings!", "🌾 Hang Mugwort Leaves!", "🌊 Swim in Dragon Water!"] 
            },
            { 
                name: "Christmas", 
                activities: ["🎄 Decorate the Tree!", "🎁 Open Presents!", "🦌 See Santa Claus!", "🎶 Sing Christmas Carols!"] 
            },
            {
                name: "Easter",
                activities: ["🥚 Hunt for Easter Eggs!", "🎨 Paint Egg Shells!", "🐰 See the Easter Bunny!", "🍫 Eat Chocolate Eggs!"]
            }
        ];

        // 5 vibrant colors matching the 5 segments
        const colors = ["#FF5722", "#4CAF50", "#2196F3", "#9C27B0", "#FF9800"];
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const scroller = document.getElementById('scroller');
        const spinBtn = document.getElementById('spinBtn');

        let currentRotation = 0;

        function drawWheel() {
            const numSegments = festivalData.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * anglePerSegment - (Math.PI / 2);
                const endAngle = startAngle + anglePerSegment;

                // Draw the pie slice
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                // Draw text horizontally inside the slice so it fits easily
                ctx.save();
                ctx.translate(radius, radius);
                // Rotate to the middle of the current slice
                ctx.rotate(startAngle + anglePerSegment / 2);
                
                // Move text outward toward the rim, then flip it horizontal to read comfortably
                ctx.translate(radius * 0.65, 0);
                ctx.rotate(-(startAngle + anglePerSegment / 2) - currentRotation * Math.PI / 180); 
                
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#FFFFFF";
                ctx.font = "bold 1.1rem Arial";
                
                // Wrap text if needed, or just let it print clean and flat
                ctx.fillText(festivalData[i].name, 0, 0);
                ctx.restore();
            }
        }

        // Keep the text upright even when rotating the wheel canvas
        canvas.style.transition = "transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)";

        function playTickSound(duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let startTime = audioCtx.currentTime;
            let tickDelay = 50;

            function nextTick() {
                if (audioCtx.currentTime - startTime > duration / 1000) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);

                tickDelay += 15; 
                setTimeout(nextTick, tickDelay);
            }
            nextTick();
        }

        function startSequence() {
            spinBtn.disabled = true;
            
            // Instantly clear the scroller element to reset state
            scroller.style.transition = "none";
            scroller.style.top = "0px";
            scroller.innerHTML = '<div class="scroller-item">Choosing activity...</div>';
            
            // Randomly pick our winning festival (0 to 4)
            const targetFestivalIndex = Math.floor(Math.random() * festivalData.length);
            
            playTickSound(3000);

            const degreesPerSegment = 360 / festivalData.length;
            const extraSpins = 3 * 360; 
            
            // Math equation calculating exact landing rotation coordinates to face the top pointer arrow
            const targetAngle = 270 - (targetFestivalIndex * degreesPerSegment) - (degreesPerSegment / 2);
            
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Wait 3 seconds for the spinner wheel to come to a full stop
            setTimeout(() => {
                const targetData = festivalData[targetFestivalIndex];
                const pool = targetData.activities;
                
                // Pick one specific correct activity out of the array matching the target festival
                const chosenActivityIndex = Math.floor(Math.random() * pool.length);
                
                // Build a slot machine illusion using ONLY matching activities for this festival
                let scrollItemsPool = [];
                for (let r = 0; r < 4; r++) {
                    pool.forEach(act => scrollItemsPool.push(act));
                }

                // Inject the updated matching data into the html scroller layout
                scroller.innerHTML = '';
                scrollItemsPool.forEach(actText => {
                    const div = document.createElement('div');
                    div.className = 'scroller-item';
                    div.innerText = actText;
                    scroller.appendChild(div);
                });

                const rowHeight = 80;
                // Position the selector index frame near the bottom of our looped item chain
                const finalTargetRow = (pool.length * 2) + chosenActivityIndex;
                const finalScrollPosition = finalTargetRow * rowHeight;

                // Execute the slot machine glide downward animation
                setTimeout(() => {
                    scroller.style.transition = "top 2.5s cubic-bezier(0.1, 0.8, 0.2, 1)";
                    scroller.style.top = `-${finalScrollPosition}px`;
                }, 50);

                // Safe lockout delay window before allowing the user to tap spin again
                setTimeout(() => {
                    spinBtn.disabled = false;
                }, 2600);

            }, 3000);
        }

        // Initialize display
        drawWheel();
    </script>
</body>
</html>
