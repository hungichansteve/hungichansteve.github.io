<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Dice Game</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }
        h1 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 3rem;
            text-align: center;
        }
        .clock-display { 
            font-size: 15vw; /* Scales with iPad screen width */
            color: #00ff41; 
            background: #000; 
            padding: 30px 60px; 
            border-radius: 20px; 
            border: 6px solid #333;
            letter-spacing: 10px;
            text-shadow: 0 0 30px #00ff41;
            margin: 20px;
        }
        button { 
            margin-top: 50px; 
            padding: 30px 80px; 
            font-size: 2.5rem; 
            background: #ff3e3e; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 15px #b30000;
        }
        button:active { box-shadow: 0 5px #b30000; transform: translateY(10px); }
    </style>
</head>
<body>

    <h1>Classroom Time Dice</h1>
    
    <div class="clock-display" id="clock">00:00</div>

    <button onclick="roll()">ROLL DICE</button>

    <script>
        function roll() {
            // Audio Feedback
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);

            // Logic
            let h = Math.floor(Math.random() * 12) + 1;
            let m = Math.floor(Math.random() * 12) * 5;
            
            document.getElementById('clock').innerHTML = 
                h.toString().padStart(2, '0') + ":" + 
                m.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
