<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Dice Game</title>
    <style>
        body { 
            background-color: #E3F2FD; /* Soft Light Blue */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; 
        }
        h1 {
            color: #1565C0; /* Deep Blue */
            margin-bottom: 20px;
            font-size: 3rem;
            text-align: center;
        }
        .clock-display { 
            font-size: 15vw; 
            color: #1565C0; 
            background: #FFFFFF; /* White clock face */
            padding: 30px 60px; 
            border-radius: 25px; 
            border: 8px solid #FFCA28; /* Bright Yellow border */
            letter-spacing: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        button { 
            margin-top: 50px; 
            padding: 30px 80px; 
            font-size: 2.5rem; 
            background: #4CAF50; /* Cheerful Green */
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 10px #2E7D32;
        }
        button:active { box-shadow: 0 5px #2E7D32; transform: translateY(5px); }
    </style>
</head>
<body>

    <h1>Classroom Time Dice</h1>
    
    <div class="clock-display" id="clock">00:00</div>

    <button onclick="roll()">ROLL DICE</button>

    <script>
        function roll() {
            // Audio Feedback (Softer "ping")
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);

            // Logic
            let h = Math.floor(Math.random() * 12) + 1;
            let m = Math.floor(Math.random() * 12) * 5;
            
            document.getElementById('clock').innerHTML = 
                h.toString().padStart(2, '0') + ":" + 
                m.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
