<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Dice Game</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 50px; 
            touch-action: manipulation; 
        }
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        }
        .box { 
            border: 3px solid #333; 
            padding: 20px; 
            width: 140px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            border-radius: 15px; 
            white-space: nowrap; 
            background-color: #f9f9f9; 
        }
        button { 
            margin-top: 40px; 
            padding: 20px 50px; 
            font-size: 1.5rem; 
            background: #007AFF; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1>Time Dice Game</h1>
    
    <div class="container">
        <div class="box" id="hour">Hour: --</div>
        <div class="box" id="minute">Minute: --</div>
    </div>

    <button onclick="playAndRoll()">Roll Dice</button>

    <script>
        function playAndRoll() {
            // Web Audio API for the beep
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);

            // Logic for Time
            let h = Math.floor(Math.random() * 12) + 1;
            let m = Math.floor(Math.random() * 12) * 5;
            
            document.getElementById('hour').innerHTML = 'Hour: ' + h;
            document.getElementById('minute').innerHTML = 'Minute: ' + m.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
