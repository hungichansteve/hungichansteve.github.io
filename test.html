data:text/html;charset=utf-8,<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{font-family:sans-serif;text-align:center;padding-top:50px;touch-action:manipulation;} .container{display:flex;justify-content:center;gap:15px;} .box{border:3px solid %23333;padding:20px;width:140px;font-size:1.4rem;font-weight:bold;border-radius:15px;white-space:nowrap;background-color:%23f9f9f9;} button{margin-top:40px;padding:20px%2050px;font-size:1.5rem;background:%23007AFF;color:white;border:none;border-radius:10px;cursor:pointer;}</style></head><body><h1>Time%20Dice%20Game</h1><div%20class="container"><div%20class="box"%20id="hour">Hour:%20--</div><div%20class="box"%20id="minute">Minute:%20--</div></div><button%20onclick="playAndRoll()">Roll%20Dice</button><script>function%20playAndRoll(){const%20ctx=new%20(window.AudioContext||window.webkitAudioContext)();const%20osc=ctx.createOscillator();osc.connect(ctx.destination);osc.frequency.setValueAtTime(880,ctx.currentTime);osc.start();osc.stop(ctx.currentTime+0.1);let%20h=Math.floor(Math.random()*12)+1;let%20m=Math.floor(Math.random()*12)*5;document.getElementById('hour').innerHTML='Hour:%20'+h;document.getElementById('minute').innerHTML='Minute:%20'+m.toString().padStart(2,'0');}</script></body></html>
